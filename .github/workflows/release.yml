name: Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Read Kotlin version from versions.yml
        id: kotlin
        run: |
          KOTLIN_VERSION=$(grep '^kotlin:' versions.yml | cut -d'"' -f2)
          echo "version=$KOTLIN_VERSION" >> $GITHUB_OUTPUT

      - name: Check if release already exists
        id: check
        run: |
          if gh release view "v${{ steps.kotlin.outputs.version }}" &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create archive
        if: steps.check.outputs.exists == 'false'
        run: |
          mkdir -p migrate-cocoapods-to-spm
          cp -r SKILL.md MIGRATION_GUIDE.md CLAUDE.md versions.yml LICENSE references migrate-cocoapods-to-spm/
          tar -czvf migrate-cocoapods-to-spm.tar.gz migrate-cocoapods-to-spm

      - name: Create Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.kotlin.outputs.version }}
          name: v${{ steps.kotlin.outputs.version }}
          files: migrate-cocoapods-to-spm.tar.gz
          body: |
            ## CocoaPods to SwiftPM Migration Skill

            **For Kotlin version**: `${{ steps.kotlin.outputs.version }}`

            ## Quick Install

            ### Claude Code
            ```bash
            curl -sL https://github.com/Kotlin/kmp-cocoapods-to-spm-migration/releases/latest/download/migrate-cocoapods-to-spm.tar.gz | tar xz -C ~/.claude/skills
            ```
            Then invoke with `/migrate-cocoapods-to-spm`

            ### Junie (JetBrains AI)
            ```bash
            curl -sL https://github.com/Kotlin/kmp-cocoapods-to-spm-migration/releases/latest/download/migrate-cocoapods-to-spm.tar.gz | tar xz -C .junie/skills
            ```
            Then invoke with `/migrate-cocoapods-to-spm`

            ### Manual Use
            Download `MIGRATION_GUIDE.md` below and drag it into any Claude conversation.
          generate_release_notes: true

      - name: Skip message
        if: steps.check.outputs.exists == 'true'
        run: |
          echo "Release v${{ steps.kotlin.outputs.version }} already exists. Update versions.yml first."
          exit 1
