name: Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate version from date
        id: version
        run: |
          echo "tag=v$(date -u +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Check if release already exists
        id: check
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create archives
        if: steps.check.outputs.exists == 'false'
        run: |
          mkdir -p migrate-cocoapods-to-spm/references
          cp SKILL.md LICENSE migrate-cocoapods-to-spm/
          cp references/*.md migrate-cocoapods-to-spm/references/
          tar -czvf migrate-cocoapods-to-spm.tar.gz migrate-cocoapods-to-spm
          zip -r migrate-cocoapods-to-spm.skill migrate-cocoapods-to-spm

      - name: Create Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: |
            migrate-cocoapods-to-spm.tar.gz
            migrate-cocoapods-to-spm.skill
          body: |
            ## CocoaPods to SwiftPM Migration Skill

            **Release**: `${{ steps.version.outputs.tag }}`

            ## Quick Install

            ### Claude Code
            ```bash
            mkdir -p .claude/skills && curl -sL https://kotl.in/pods-spm-skill | tar xz -C .claude/skills
            ```
            Then invoke with `/migrate-cocoapods-to-spm`

            ### Junie (JetBrains AI)
            ```bash
            mkdir -p .junie/skills && curl -sL https://kotl.in/pods-spm-skill | tar xz -C .junie/skills
            ```
            Then invoke with `/migrate-cocoapods-to-spm`

            ### Codex
            ```bash
            mkdir -p .codex/skills && curl -sL https://kotl.in/pods-spm-skill | tar xz -C .codex/skills
            ```
            Then invoke the `migrate-cocoapods-to-spm` skill in Codex

            ### Alternative: .skill Package
            Download `migrate-cocoapods-to-spm.skill` and extract to your skills directory.

            ### Manual Use
            Download [MIGRATION_GUIDE.md](https://github.com/Kotlin/kmp-cocoapods-to-spm-migration/blob/master/MIGRATION_GUIDE.md) and share it with your AI assistant.
          generate_release_notes: true

      - name: Skip message
        if: steps.check.outputs.exists == 'true'
        run: |
          echo "Release ${{ steps.version.outputs.tag }} already exists."
          exit 1
