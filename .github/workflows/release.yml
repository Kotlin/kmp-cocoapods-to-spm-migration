name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "tag=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Read Kotlin version from versions.yml
        id: kotlin
        run: |
          KOTLIN_VERSION=$(grep '^kotlin:' versions.yml | cut -d'"' -f2)
          echo "kotlin_version=$KOTLIN_VERSION" >> $GITHUB_OUTPUT

      - name: Create archive
        run: |
          mkdir -p migrate-cocoapods-to-spm
          cp -r SKILL.md MIGRATION_GUIDE.md CLAUDE.md versions.yml LICENSE references migrate-cocoapods-to-spm/
          tar -czvf migrate-cocoapods-to-spm.tar.gz migrate-cocoapods-to-spm

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: v${{ steps.version.outputs.version }}
          files: migrate-cocoapods-to-spm.tar.gz
          body: |
            ## CocoaPods to SwiftPM Migration Skill v${{ steps.version.outputs.version }}

            **Kotlin version**: `${{ steps.kotlin.outputs.kotlin_version }}`

            ## Quick Install

            ### Claude Code
            ```bash
            curl -sL https://github.com/Kotlin/kmp-cocoapods-to-spm-migration/releases/latest/download/migrate-cocoapods-to-spm.tar.gz | tar xz -C ~/.claude/skills
            ```
            Then invoke with `/migrate-cocoapods-to-spm`

            ### Junie (JetBrains AI)
            ```bash
            curl -sL https://github.com/Kotlin/kmp-cocoapods-to-spm-migration/releases/latest/download/migrate-cocoapods-to-spm.tar.gz | tar xz -C .junie/skills
            ```
            Then invoke with `/migrate-cocoapods-to-spm`

            ### Manual Use
            Download `MIGRATION_GUIDE.md` below and drag it into any Claude conversation.
          generate_release_notes: true
